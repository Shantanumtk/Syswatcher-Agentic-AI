global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: syswatcher

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Local node (Docker host via node_exporter container)
  - job_name: local
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          server_name: local

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Remote servers added by install.sh / manage.sh --add-server
  # Template:
  # - job_name: prod-01
  #   static_configs:
  #     - targets: ["192.168.1.100:9100"]
  #       labels:
  #         server_name: prod-01
